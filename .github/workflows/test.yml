name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Lint (syntax check)
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Run lightweight tests (model/DB-independent)
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_semantic_axes.py tests/test_highlight_view.py tests/test_config.py -q -p no:cacheprovider

      # 埋め込みモデル・ChromaDB を要するテスト（text_alignment / highlight_smoke /
      # visualization_page など）は重いため CI では実行せず、ローカルで:
      #   PYTHONPATH=. pytest tests/ -q
      # を推奨。

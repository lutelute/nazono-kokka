<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>謎の国家 RAG — 類似度＆解析ツール（ブラウザ版）</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css" />
  <style>
    #loading { font-family: "Hiragino Sans","Noto Sans JP",sans-serif; color:#555;
               max-width:640px; margin:80px auto; text-align:center; line-height:1.9; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <h2>🔬 類似度＆解析ツールを起動中…</h2>
      <p>ブラウザ内で Python (Pyodide) をロードしています。<br>
         初回は 20〜40 秒ほどかかります。サーバーは使っていません。</p>
    </div>
  </div>
  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js";

    const APP = `
import html
import json

import altair as alt
import numpy as np
import pandas as pd
import plotly.express as px
import streamlit as st

st.set_page_config(page_title="謎の国家 RAG — 類似度＆解析（ブラウザ版）",
                   page_icon="🔬", layout="wide")


@st.cache_data
def load_data():
    with open("data.json", encoding="utf-8") as f:
        return json.load(f)


DATA = load_data()
STORIES = DATA["stories"]
PAIRS = DATA["pairs"]
CORPUS = DATA["corpus"]
NAMES = list(STORIES.keys())

st.title("🔬 謎の国家 RAG — 類似度＆解析ツール（ブラウザ版）")
st.caption(
    "サーバー不要・ブラウザ内 Python で動く版。"
    "埋め込み（" + DATA["model"] + " / 768次元）と語単位の解析は事前計算済み。"
    "自由入力テキストの解析と RAG チャットはローカル版（README 参照）で。"
)

PALETTE = [
    "rgba(239,68,68,.30)", "rgba(59,130,246,.30)", "rgba(16,185,129,.30)",
    "rgba(245,158,11,.35)", "rgba(168,85,247,.30)", "rgba(236,72,153,.30)",
    "rgba(20,184,166,.30)", "rgba(99,102,241,.30)",
]


def get_pair(na, nb):
    """ペア事前計算を取得。保存順と逆なら side を入れ替えて返す。"""
    key = na + "|" + nb
    if key in PAIRS:
        p = PAIRS[key]
        return p, p["a"], p["b"], p["a_to_b"], p["a_to_b_score"]
    p = PAIRS[nb + "|" + na]
    return p, p["b"], p["a"], p["b_to_a"], p["b_to_a_score"]


def heat_html(words, centered, punct):
    """centered 値を ±max 正規化して 正=赤 / 負=青 で語に色を付ける。"""
    arr = np.array(centered)
    m = float(np.abs(arr).max()) or 1.0
    parts = []
    for w, c, pu in zip(words, arr, punct):
        t = html.escape(w)
        if pu:
            parts.append(t)
            continue
        alpha = round(abs(float(c)) / m * 0.55, 3)
        color = "239,68,68" if c > 0 else "59,130,246"
        parts.append(
            "<span style='background:rgba(" + color + "," + str(alpha)
            + ");border-radius:3px'>" + t + "</span>"
        )
    return "<div style='line-height:2.1;font-size:1.02rem'>" + "".join(parts) + "</div>"


tabs = st.tabs([
    "① 類似度行列", "② 二話ハイライト比較", "③ 埋め込み地図(2D/3D)",
    "④ 法令⇄判例の軸", "⑤ 近傍検索", "⑥ クラスタ", "⑦ 重複検出",
])

# ----------------------------------------------------------------- ① 行列
with tabs[0]:
    st.subheader("物語・条文どうしのコサイン類似度")
    vecs = np.array([STORIES[n]["vec"] for n in NAMES])
    sim = vecs @ vecs.T
    st.dataframe(pd.DataFrame(np.round(sim, 3), index=NAMES, columns=NAMES),
                 use_container_width=True)
    st.markdown(
        "- 桃太郎と浦島太郎のような **同ジャンル（昔話）** は高め、"
        "物語と **法律条文** は低くなります。\\n"
        "- RAG はこの数字で「同じ話題か違う話題か」を判断しています。"
    )

# ----------------------------------------------------------------- ② ハイライト
with tabs[1]:
    c1, c2 = st.columns(2)
    with c1:
        na = st.selectbox("テキスト A", NAMES, index=0)
    with c2:
        nb = st.selectbox("テキスト B", NAMES, index=1, key="nb_sel")
    if na == nb:
        st.info("別のテキストを選んでください。")
    else:
        pair, sa_side, sb_side, a2b, a2b_score = get_pair(na, nb)
        st.metric("コサイン類似度", pair["cosine"])
        sub1, sub2, sub3 = st.tabs(["文の対応（読みやすい）", "語の寄与ヒートマップ", "語のペアリング"])

        # --- 文アライメント（保存済み文ベクトルからその場で計算） ---
        with sub1:
            thresh = st.slider("対応とみなす類似度のしきい値", 0.20, 0.80, 0.40, 0.05)
            A, B = STORIES[na], STORIES[nb]
            va = np.array(A["sent_vecs"]); vb = np.array(B["sent_vecs"])
            simmat = va @ vb.T
            pair_color = {}
            ci = 0
            for i in range(len(A["sentences"])):
                j = int(np.argmax(simmat[i]))
                if float(simmat[i][j]) >= thresh:
                    pair_color[(i, j)] = PALETTE[ci % len(PALETTE)]
                    ci += 1

            def render(sents, side):
                parts = []
                for idx, s in enumerate(sents):
                    c = None
                    for (ai, bj), col in pair_color.items():
                        if (side == "a" and ai == idx) or (side == "b" and bj == idx):
                            c = col
                            break
                    t = html.escape(s)
                    parts.append(
                        "<span style='background:" + c + ";border-radius:4px;padding:1px 2px'>" + t + "</span>"
                        if c else t
                    )
                return "<div style='line-height:2.0;font-size:1.02rem'>" + "".join(parts) + "</div>"

            h1, h2 = st.columns(2)
            with h1:
                st.markdown("**" + html.escape(na) + "**")
                st.markdown(render(A["sentences"], "a"), unsafe_allow_html=True)
            with h2:
                st.markdown("**" + html.escape(nb) + "**")
                st.markdown(render(B["sentences"], "b"), unsafe_allow_html=True)
            st.caption("同じ色 = 対応づいた文ペア。日本語ではこの文単位が最も読みやすい方式です。")

        # --- トークン寄与（mean-pooling 厳密分解 + 中心化コントラスト） ---
        with sub2:
            st.markdown(
                "文ベクトルは **全トークン埋め込みの平均** なので、コサイン類似度は"
                "各語の寄与に **厳密に分解** できます（Σ raw ≈ cos、差は特殊トークン分）。"
                "色は機能語（て・に・を・は）を抑えた **中心化コントラスト**: "
                "<span style='background:rgba(239,68,68,.35);border-radius:3px'>赤 = 類似度を押し上げる語</span> / "
                "<span style='background:rgba(59,130,246,.35);border-radius:3px'>青 = 引き下げる語</span>",
                unsafe_allow_html=True,
            )
            g1, g2 = st.columns(2)
            with g1:
                st.markdown("**" + html.escape(na) + "** （相手 = " + html.escape(nb) + "）")
                st.markdown(heat_html(sa_side["words"], sa_side["centered"], sa_side["punct"]),
                            unsafe_allow_html=True)
                st.caption("Σ raw = " + str(round(float(np.sum(sa_side["raw"])), 3))
                           + " ≈ cos " + str(pair["cosine"]))
            with g2:
                st.markdown("**" + html.escape(nb) + "** （相手 = " + html.escape(na) + "）")
                st.markdown(heat_html(sb_side["words"], sb_side["centered"], sb_side["punct"]),
                            unsafe_allow_html=True)
                st.caption("Σ raw = " + str(round(float(np.sum(sb_side["raw"])), 3))
                           + " ≈ cos " + str(pair["cosine"]))

        # --- ペアリング（BERTScore 風 max-sim） ---
        with sub3:
            st.markdown("A の各語に対して、B で **意味が最も近い語** を結びます（max-sim）。")
            hide_punct = st.checkbox("句読点・記号を隠す", value=True)
            rows = []
            for i, w in enumerate(sa_side["words"]):
                if hide_punct and sa_side["punct"][i]:
                    continue
                j = a2b[i]
                rows.append({
                    "A の語": w,
                    "B の最も近い語": sb_side["words"][j] if j < len(sb_side["words"]) else "—",
                    "類似度": round(float(a2b_score[i]), 3),
                })
            dfp = pd.DataFrame(rows).sort_values("類似度", ascending=False)
            st.dataframe(
                dfp, use_container_width=True, hide_index=True, height=420,
                column_config={"類似度": st.column_config.ProgressColumn(
                    "類似度", min_value=0.0, max_value=1.0, format="%.3f")},
            )
            st.caption("「太郎↔太郎」「むかし↔むかし」のような共通語は 1.0 近くになります。")

# ----------------------------------------------------------------- ③ 地図
with tabs[2]:
    st.subheader("書庫 1,399 文書の埋め込み地図（PCA で 768次元を圧縮）")

    st.markdown("#### 2D（凡例クリックで種別を絞り込み）")
    xy = np.array(CORPUS["pca_xy"])
    dfm = pd.DataFrame({"x": xy[:, 0], "y": xy[:, 1], "種別": CORPUS["group"]})
    sel = alt.selection_point(fields=["種別"], bind="legend")
    chart = (
        alt.Chart(dfm)
        .mark_circle(size=22)
        .encode(
            x=alt.X("x", title="第1主成分"),
            y=alt.Y("y", title="第2主成分"),
            color=alt.Color("種別", legend=alt.Legend(title="文書種別（クリックで絞込）")),
            opacity=alt.condition(sel, alt.value(0.6), alt.value(0.04)),
            tooltip=["種別"],
        )
        .add_params(sel)
        .properties(height=440)
        .interactive()
    )
    st.altair_chart(chart, use_container_width=True)
    st.caption("凡例をクリックすると種別を絞り込めます（判例を消すと物語の島が浮きます）。")

    st.markdown("#### 3D（ドラッグで回転・ホイールでズーム）")
    xyz = np.array(CORPUS["pca_xyz"])
    dfm3 = pd.DataFrame({"PC1": xyz[:, 0], "PC2": xyz[:, 1], "PC3": xyz[:, 2],
                         "種別": CORPUS["group"]})
    fig = px.scatter_3d(dfm3, x="PC1", y="PC2", z="PC3", color="種別",
                        opacity=0.55, height=600)
    fig.update_traces(marker_size=2.6)
    fig.update_layout(margin=dict(l=0, r=0, t=10, b=0),
                      legend=dict(title="文書種別（ダブルクリックで単独表示）"))
    st.plotly_chart(fig, use_container_width=True)
    st.caption("第3主成分まで見ると、2D では重なっていた群がほどけます。")

    ev = CORPUS["explained_variance"]
    dfe = pd.DataFrame({"主成分": list(range(1, len(ev) + 1)), "分散説明率": ev})
    st.markdown("**主成分の分散説明率**（768次元のうち上位20軸）")
    st.altair_chart(
        alt.Chart(dfe).mark_bar().encode(
            x=alt.X("主成分:O"), y=alt.Y("分散説明率:Q", axis=alt.Axis(format="%"))
        ).properties(height=180),
        use_container_width=True,
    )
    st.caption(
        "第1軸 " + str(round(ev[0] * 100, 1)) + "% / 上位20軸 累積 "
        + str(round(float(np.sum(ev)) * 100, 1)) + "% — 実効次元は 768 よりずっと小さい。"
    )

# ----------------------------------------------------------------- ④ 軸
with tabs[3]:
    st.subheader("『法令 ⇄ 判例』概念軸への射影")
    st.markdown(
        "法令グループの重心と判例グループの重心を結ぶ方向（768次元の単位ベクトル）に"
        "全文書を射影した値。**正側 = 法令らしい / 負側 = 判例らしい**。"
        "物語がどこに落ちるかにも注目。"
    )
    dfa = pd.DataFrame({"射影値": CORPUS["axis_projection"], "種別": CORPUS["group"]})
    st.altair_chart(
        alt.Chart(dfa).mark_tick(opacity=0.35, thickness=1.5).encode(
            x=alt.X("射影値:Q"),
            y=alt.Y("種別:N", sort="-x", title=None),
            color=alt.Color("種別:N", legend=None),
        ).properties(height=300),
        use_container_width=True,
    )
    means = dfa.groupby("種別")["射影値"].agg(["mean", "std", "count"]).reset_index()
    means.columns = ["種別", "平均", "標準偏差", "件数"]
    st.dataframe(means.sort_values("平均", ascending=False).round(3),
                 use_container_width=True, hide_index=True)

# ----------------------------------------------------------------- ⑤ 近傍
with tabs[4]:
    st.subheader("物語・条文をクエリにして書庫を検索（境界の探究）")
    q = st.selectbox("クエリにするテキスト", NAMES, index=0, key="nn_query")
    rows = CORPUS["neighbors"][q]
    dfn = pd.DataFrame(rows).rename(columns={"group": "種別", "name": "文書", "sim": "類似度"})
    st.dataframe(
        dfn, use_container_width=True, hide_index=True,
        column_config={"類似度": st.column_config.ProgressColumn(
            "類似度", min_value=0.0, max_value=1.0, format="%.3f")},
    )
    st.markdown(
        "- **童話をクエリ**にすると最高でも 0.3 前後しかヒットしない（= 書庫に同じ話題がない）。\\n"
        "- **条文プリセット**だと法令・判例が 0.5〜0.7 で強くヒットする。\\n"
        "- この差が、RAG が「関係ある資料だけを引いてくる」根拠です。"
    )

# ----------------------------------------------------------------- ⑥ クラスタ
with tabs[5]:
    st.subheader("K-means クラスタリング（事前計算済み・k を切替）")
    k = st.radio("クラスタ数 k", ["4", "6", "8", "10"], index=2, horizontal=True)
    xy = np.array(CORPUS["pca_xy"])
    dfc = pd.DataFrame({
        "x": xy[:, 0], "y": xy[:, 1],
        "cluster": [str(c) for c in CORPUS["kmeans"][k]],
        "種別": CORPUS["group"],
    })
    st.altair_chart(
        alt.Chart(dfc).mark_circle(size=22, opacity=0.6).encode(
            x=alt.X("x", title="第1主成分"), y=alt.Y("y", title="第2主成分"),
            color=alt.Color("cluster:N", legend=alt.Legend(title="クラスタ")),
            tooltip=["cluster", "種別"],
        ).properties(height=460).interactive(),
        use_container_width=True,
    )
    cross = pd.crosstab(
        pd.Series(dfc["cluster"], name="クラスタ"), pd.Series(dfc["種別"], name="種別")
    )
    st.markdown("**クラスタ × 文書種別のクロス表**（教師なしでも種別がほぼ分離します）")
    st.dataframe(cross, use_container_width=True)

# ----------------------------------------------------------------- ⑦ 重複
with tabs[6]:
    st.subheader("書庫内の重複候補（類似度が最も高い文書ペア top30）")
    dfd = pd.DataFrame(CORPUS["duplicates"]).rename(columns={
        "a": "文書A", "ga": "種別A", "b": "文書B", "gb": "種別B",
        "sim": "類似度", "head_a": "A 冒頭", "head_b": "B 冒頭",
    })
    st.dataframe(
        dfd[["類似度", "文書A", "種別A", "A 冒頭", "文書B", "種別B", "B 冒頭"]],
        use_container_width=True, hide_index=True, height=560,
        column_config={"類似度": st.column_config.ProgressColumn(
            "類似度", min_value=0.0, max_value=1.0, format="%.3f")},
    )
    st.caption("テンプレートが似ている判例どうしが上位に並びます。書庫の品質チェックに使う機能です。")
`;

    const dataUrl = new URL("data.json", window.location.href).href;
    mount(
      {
        requirements: ["numpy", "pandas", "altair", "plotly"],
        entrypoint: "app.py",
        files: {
          "app.py": APP,
          "data.json": { url: dataUrl },
        },
      },
      document.getElementById("root"),
    );
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="謎の国家 — 国家機密 RAG 文書解析システム / NAZONO KOKKA CLASSIFIED RAG ARCHIVE">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#08080c"/>
    <stop offset="0.55" stop-color="#0c0c14"/>
    <stop offset="1" stop-color="#131019"/>
  </linearGradient>
  <radialGradient id="glowAmber" cx="0.74" cy="0.32" r="0.55">
    <stop offset="0" stop-color="#d9a441" stop-opacity="0.22"/>
    <stop offset="1" stop-color="#d9a441" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowRed" cx="0.16" cy="0.96" r="0.7">
    <stop offset="0" stop-color="#d6283b" stop-opacity="0.16"/>
    <stop offset="1" stop-color="#d6283b" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="vignette" cx="0.5" cy="0.46" r="0.72">
    <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
    <stop offset="1" stop-color="#000000" stop-opacity="0.6"/>
  </radialGradient>
  <radialGradient id="iris" cx="0.5" cy="0.38" r="0.62">
    <stop offset="0" stop-color="#ffe7a6"/>
    <stop offset="0.5" stop-color="#e0a93f"/>
    <stop offset="1" stop-color="#8f6219"/>
  </radialGradient>
  <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#f0c45e" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#ffd877" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#f0c45e" stop-opacity="0"/>
  </linearGradient>
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
  </pattern>
  <pattern id="scanlines" width="3" height="3" patternUnits="userSpaceOnUse">
    <rect width="3" height="1" fill="#000000" fill-opacity="0.16"/>
  </pattern>
  <pattern id="hazard" width="34" height="34" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="34" height="34" fill="#0c0c12"/>
    <rect width="17" height="34" fill="#c01f2e"/>
  </pattern>
  <filter id="softRed" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#d6283b" flood-opacity="0.55"/>
  </filter>
  <filter id="eyeGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6"/>
  </filter>
  <style>
    @keyframes sweep { 0%{transform:translateY(-30px);opacity:0} 7%{opacity:.55} 93%{opacity:.55} 100%{transform:translateY(360px);opacity:0} }
    @keyframes flick { 0%,92%,100%{opacity:.92} 93%{opacity:.42} 95%{opacity:.95} 96%{opacity:.55} 97%{opacity:.9} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
    @keyframes glitch { 0%,96%,100%{opacity:0;transform:translateX(0)} 97%{opacity:.5;transform:translateX(-4px)} 98%{opacity:0;transform:translateX(3px)} }
    .scan{animation:sweep 7s linear infinite}
    .flick{animation:flick 5.5s linear infinite}
    .pulse{animation:pulse 3.6s ease-in-out infinite}
    .glitch{animation:glitch 6.5s linear infinite}
    @media (prefers-reduced-motion: reduce){ .scan,.flick,.pulse,.glitch{animation:none} }
  </style>
</defs>

<!-- ===== background ===== -->
<rect width="1280" height="360" fill="url(#bg)"/>
<rect width="1280" height="360" fill="url(#grid)"/>
<rect width="1280" height="360" fill="url(#glowAmber)"/>
<rect width="1280" height="360" fill="url(#glowRed)"/>
<rect x="0" y="0" width="1280" height="3" fill="#d6283b" fill-opacity="0.75"/>

<!-- ===== all-seeing eye emblem (right) ===== -->
<g transform="translate(1068,168)">
  <circle r="42" fill="#f0c45e" filter="url(#eyeGlow)" opacity="0.22"/>
  <circle r="94" fill="none" stroke="#d9a441" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="3 9">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="44s" repeatCount="indefinite"/>
  </circle>
  <circle r="79" fill="none" stroke="#d9a441" stroke-opacity="0.30" stroke-width="1"/>
  <g stroke="#d9a441" stroke-opacity="0.4" stroke-width="2">
    <line x1="0" y1="-104" x2="0" y2="-86"/>
    <line x1="74" y1="-74" x2="61" y2="-61"/>
    <line x1="104" y1="0" x2="86" y2="0"/>
    <line x1="74" y1="74" x2="61" y2="61"/>
    <line x1="-74" y1="-74" x2="-61" y2="-61"/>
    <line x1="-104" y1="0" x2="-86" y2="0"/>
    <line x1="-74" y1="74" x2="-61" y2="61"/>
  </g>
  <polygon points="0,-70 82,58 -82,58" fill="#d9a441" fill-opacity="0.05" stroke="none"/>
  <polygon points="0,-70 82,58 -82,58" fill="none" stroke="#e3b54e" stroke-width="2.5" stroke-linejoin="round"/>
  <ellipse cx="0" cy="14" rx="52" ry="27" fill="#0a0a0f" stroke="#e3b54e" stroke-width="2"/>
  <g class="pulse">
    <circle cx="0" cy="14" r="18" fill="url(#iris)"/>
    <circle cx="0" cy="14" r="8.5" fill="#08080c"/>
    <circle cx="-5" cy="9" r="2.6" fill="#fff6df" opacity="0.85"/>
  </g>
</g>

<!-- ===== 極秘 stamp ===== -->
<g transform="translate(902,250) rotate(-15)" class="flick">
  <circle r="49" fill="none" stroke="#d6283b" stroke-width="4" stroke-opacity="0.82" stroke-dasharray="74 5 40 6 120"/>
  <circle r="40" fill="none" stroke="#d6283b" stroke-width="1.4" stroke-opacity="0.7"/>
  <text x="0" y="11" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif" font-size="34" font-weight="700" fill="#d6283b" fill-opacity="0.9" letter-spacing="2">極秘</text>
  <text x="0" y="-26" text-anchor="middle" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="8" letter-spacing="3" fill="#d6283b" fill-opacity="0.85">TOP SECRET</text>
  <text x="0" y="33" text-anchor="middle" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="7.5" letter-spacing="2" fill="#d6283b" fill-opacity="0.8">持出厳禁 / NO COPY</text>
  <rect x="-50" y="-6" width="100" height="2" fill="#0c0c14" opacity="0.6"/>
  <rect x="-30" y="20" width="64" height="1.6" fill="#0c0c14" opacity="0.5"/>
</g>

<!-- ===== header metadata ===== -->
<g font-family="'SFMono-Regular',Menlo,Consolas,monospace">
  <circle cx="74" cy="42" r="3.5" fill="#d6283b"/>
  <text x="86" y="46" font-size="14" letter-spacing="1.5" fill="#8b8f9d">国家機密文書館 · CENTRAL ARCHIVE OF THE ENIGMATIC STATE</text>
  <text x="74" y="70" font-size="12.5" letter-spacing="1" fill="#6b6f7d">分類 CLASSIFICATION:</text>
  <rect x="232" y="59" width="60" height="15" fill="#0a0a0e" stroke="#d6283b" stroke-opacity="0.5"/>
  <text x="262" y="70" text-anchor="middle" font-size="11.5" letter-spacing="2" fill="#d6283b">極秘</text>
  <text x="302" y="70" font-size="12.5" letter-spacing="1" fill="#6b6f7d">EYES ONLY   DOC N° NK-4827-Δ   CLEARANCE</text>
  <rect x="690" y="59" width="58" height="15" fill="#16161c"/>
  <rect x="690" y="75.5" width="58" height="1.4" fill="#d6283b" opacity="0.7"/>
</g>

<!-- ===== title block ===== -->
<g filter="url(#softRed)">
  <text x="70" y="178" font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif" font-size="96" font-weight="700" fill="#ece9e1" letter-spacing="6">謎の国家</text>
</g>
<text x="76" y="214" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="20" letter-spacing="10" fill="#d9a441">NAZONO KOKKA</text>
<text x="78" y="248" font-family="-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif" font-size="17" letter-spacing="1" fill="#b9bcc6">国家機密 RAG 文書解析システム — RETRIEVAL-AUGMENTED DOSSIER ENGINE</text>

<!-- divider -->
<line x1="78" y1="266" x2="624" y2="266" stroke="#d9a441" stroke-opacity="0.5" stroke-width="1"/>
<rect x="78" y="262" width="8" height="8" transform="rotate(45 82 266)" fill="#d9a441" fill-opacity="0.7"/>

<text x="78" y="290" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="12.5" letter-spacing="1.5" fill="#6f7382">CONSTITUTION ▸ ETHICS CODES ▸ 1,206 CASE FILES ▸ 35 FOLK DOSSIERS ▸ 768-DIM VECTOR SPACE</text>

<!-- redaction smear -->
<rect x="78" y="305" width="150" height="14" fill="#0a0a0e"/>
<rect x="236" y="305" width="92" height="14" fill="#0a0a0e"/>
<rect x="78" y="320.5" width="250" height="1.4" fill="#d6283b" opacity="0.45"/>
<text x="340" y="316" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="11" letter-spacing="2" fill="#4f5360">REF ███-██-Δ  // 真実は索引の中にある</text>

<!-- ===== barcode ===== -->
<g transform="translate(1120,300)" fill="#cfd2da" opacity="0.72">
  <rect x="0" y="0" width="2" height="22"/><rect x="4" y="0" width="1" height="22"/>
  <rect x="7" y="0" width="3" height="22"/><rect x="12" y="0" width="1" height="22"/>
  <rect x="15" y="0" width="2" height="22"/><rect x="19" y="0" width="4" height="22"/>
  <rect x="25" y="0" width="1" height="22"/><rect x="28" y="0" width="2" height="22"/>
  <rect x="32" y="0" width="3" height="22"/><rect x="37" y="0" width="1" height="22"/>
  <rect x="40" y="0" width="2" height="22"/><rect x="45" y="0" width="3" height="22"/>
  <rect x="50" y="0" width="1" height="22"/><rect x="53" y="0" width="2" height="22"/>
  <text x="56" y="11" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="9" fill="#9498a4" letter-spacing="1">NK-4827-Δ</text>
</g>

<!-- ===== scanline + glitch overlays ===== -->
<rect class="scan" x="0" y="0" width="1280" height="28" fill="url(#scanGrad)" opacity="0.5"/>
<rect class="glitch" x="70" y="150" width="430" height="10" fill="#39c5d6" opacity="0"/>
<rect width="1280" height="360" fill="url(#scanlines)" opacity="0.5"/>
<rect width="1280" height="360" fill="url(#vignette)"/>

<!-- ===== corner crop marks ===== -->
<g stroke="#d9a441" stroke-opacity="0.45" stroke-width="1.4" fill="none">
  <path d="M24 40 V24 H40"/>
  <path d="M1256 40 V24 H1240"/>
  <path d="M24 296 V312 H40"/>
  <path d="M1256 296 V312 H1240"/>
</g>

<!-- ===== bottom hazard strip ===== -->
<rect x="0" y="324" width="1280" height="36" fill="url(#hazard)" opacity="0.92"/>
<rect x="0" y="324" width="1280" height="36" fill="#000000" opacity="0.32"/>
<rect x="318" y="330" width="644" height="24" fill="#0a0a0e" opacity="0.78"/>
<text x="640" y="346" text-anchor="middle" class="flick" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="13" letter-spacing="3.5" fill="#f0e9d8">// CLASSIFIED // 取扱注意 // 持出禁止 // EYES ONLY // 複製厳禁 //</text>
</svg>
